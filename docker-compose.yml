version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - servicehive-network

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/servicehive
      - JWT_SECRET=your_super_secret_key
      - JWT_EXPIRES_IN=30d
      - PORT=5000
    depends_on:
      - mongodb
    networks:
      - servicehive-network

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        - VITE_API_URL=http://localhost:5000/api
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - servicehive-network

networks:
  servicehive-network:
    driver: bridge

volumes:
  mongodb_data:
